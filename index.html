<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AI Помощник</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    :root {
      --primary: #ffffff;
      --primary-dark: #1a1a1a;
      --accent: #4263eb;
      --danger: #ff6b6b;
      --success: #40c057;
      --background: #0a0a0a;
      --surface: #121212;
      --card-bg: #1e1e1e;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --text-tertiary: #8a8a8a;
      --border: #2a2a2a;
      --shadow: rgba(0, 0, 0, 0.4);
    }
    
    [data-theme="light"] {
      --primary: #000000;
      --primary-dark: #f0f0f0;
      --background: #f5f5f5;
      --surface: #ffffff;
      --card-bg: #ffffff;
      --text-primary: #121212;
      --text-secondary: #5a5a5a;
      --text-tertiary: #8a8a8a;
      --border: #e0e0e0;
      --shadow: rgba(0, 0, 0, 0.08);
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      height: 100vh;
      background: var(--background);
      padding: 0;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: var(--text-primary);
      transition: background 0.3s ease;
    }
    
    .status-bar {
      height: 44px;
      padding: 0 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 17px;
      font-weight: 600;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    
    .time {
      font-weight: 600;
    }
    
    .theme-toggle {
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 24px;
      cursor: pointer;
      padding: 5px;
    }
    
    .app-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 24px;
      max-width: 500px;
      margin: 0 auto;
      flex-grow: 1;
      align-content: flex-start;
    }
    
    .app-icon {
      width: 100%;
      aspect-ratio: 1/1;
      background: var(--card-bg);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 6px 16px var(--shadow);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
      user-select: none;
      border: 1px solid var(--border);
    }
    
    .app-icon:active {
      transform: scale(0.95);
    }
    
    .app-icon:hover {
      box-shadow: 0 8px 24px var(--shadow);
    }
    
    .app-icon i {
      font-size: 36px;
      margin-bottom: 12px;
      color: var(--accent);
    }
    
    .app-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      text-align: center;
      max-width: 80%;
    }
    
    .app-description {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 6px;
      padding: 0 10px;
      text-align: center;
    }
    
    .control-panel {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 20px;
      margin-top: auto;
      box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.1);
      border-top: 1px solid var(--border);
    }
    
    .control-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      gap: 10px;
    }
    
    .control-button {
      flex: 1;
      background: var(--card-bg);
      border-radius: 14px;
      padding: 15px 10px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .control-button:active {
      transform: scale(0.95);
    }
    
    .control-button i {
      font-size: 24px;
      display: block;
      margin-bottom: 8px;
      color: var(--accent);
    }
    
    .control-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }
    
    .version-info {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      color: var(--text-tertiary);
    }
    
    .home-indicator {
      width: 140px;
      height: 5px;
      background: var(--text-primary);
      border-radius: 3px;
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0.3;
    }
    
    .app-icon::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .app-icon:hover::after {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="status-bar">
    <div class="time" id="current-time">9:41</div>
    <div>
      <button class="theme-toggle" id="theme-toggle">🌓</button>
    </div>
  </div>
  
  <div class="app-grid">
    <div class="app-icon" id="chat-app">
      <i>💬</i>
      <div class="app-name">AI Чат</div>
      <div class="app-description">Общение с ИИ-помощником</div>
    </div>
    
    <div class="app-icon" id="calendar-app">
      <i>📅</i>
      <div class="app-name">Календарь</div>
      <div class="app-description">Управление событиями</div>
    </div>
  </div>
  
  <div class="control-panel">
    <div class="control-row">
      <div class="control-button" id="refresh-button">
        <i>🔄</i>
        <div class="control-label">Обновить</div>
      </div>
      
      <div class="control-button" id="share-button">
        <i>📤</i>
        <div class="control-label">Поделиться</div>
      </div>
      
      <div class="control-button" id="settings-button">
        <i>⚙️</i>
        <div class="control-label">Настройки</div>
      </div>
    </div>
  </div>
  
  <div class="version-info" id="version-display">Версия 2.5</div>
  
  <div class="home-indicator"></div>

  <script>
    // Конфигурация приложения
    const APP_VERSION = "2.5";
    
    // Инициализация приложения
    function initApp() {
      // Установка темы из localStorage
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      
      // Обновляем время
      updateTime();
      setInterval(updateTime, 60000);
      
      // Назначаем обработчики
      document.getElementById('chat-app').addEventListener('click', () => {
        window.location.href = 'chat.html';
      });
      
      document.getElementById('calendar-app').addEventListener('click', () => {
        localStorage.setItem('calendar_command', 'true');
        window.location.href = 'chat.html';
      });
      
      document.getElementById('refresh-button').addEventListener('click', () => {
        window.location.reload();
      });
      
      document.getElementById('share-button').addEventListener('click', shareApp);
      document.getElementById('settings-button').addEventListener('click', showSettings);
      
      document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
      
      // Показываем версию
      document.getElementById('version-display').textContent = `Версия ${APP_VERSION}`;
    }
    
    // Обновляем время в статус-баре
    function updateTime() {
      const now = new Date();
      const hours = now.getHours().toString().padStart(2, '0');
      const minutes = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('current-time').textContent = `${hours}:${minutes}`;
    }
    
    // Функция "Поделиться"
    function shareApp() {
      const shareUrl = window.location.href;
      
      if (navigator.share) {
        navigator.share({
          title: 'AI Помощник',
          text: 'Попробуйте это приложение с ИИ!',
          url: shareUrl
        });
      } else {
        navigator.clipboard.writeText(shareUrl).then(() => {
          alert('Ссылка скопирована в буфер обмена!');
        });
      }
    }
    
    // Переключение темы
    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    }
    
    // Показ настроек
    function showSettings() {
      alert('Настройки приложения:\n\n• Уведомления: Вкл\n• Автообновление: Вкл\n• Тема: Системная');
    }
    
    // Запуск приложения после загрузки
    window.addEventListener('DOMContentLoaded', initApp);
  </script>
  <script src="/service-worker-registration.js"></script>
</body>
</html>
