<body>
  <div id="chat-container">
    <h1>Мой AI-помощник</h1>
    <div id="chat-history"></div>
    <div class="input-area">
      <input type="text" id="user-input" placeholder="Задайте вопрос..." />
      <button id="send-btn">Отправить</button>
    </div>
  </div>

  <style>
    /* Стили для чата */
    #chat-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      font-family: -apple-system, sans-serif;
    }

    #chat-history {
      height: 60vh;
      overflow-y: auto;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      background: #f9f9f9;
    }

    .message {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 80%;
    }

    .user-message {
      background: #007aff;
      color: white;
      margin-left: auto;
    }

    .bot-message {
      background: #e5e5ea;
      margin-right: auto;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 16px;
    }

    #send-btn {
      padding: 0 25px;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 16px;
    }
  </style>

  <script>
    // Код для работы с API добавим на следующем шаге
  </script>
</body>
