<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Оффлайн режим</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      text-align: center;
      padding: 40px 20px;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    
    h1 {
      color: #e03131;
      margin-bottom: 20px;
    }
    
    .retry-btn {
      background: #4263eb;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px 30px;
      font-size: 17px;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Нет подключения к интернету</h1>
  <p>Приложение работает в оффлайн режиме. Для работы чата требуется интернет.</p>
  
  <button class="retry-btn" id="retry-btn">Повторить попытку</button>

  <script>
    document.getElementById('retry-btn').addEventListener('click', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
