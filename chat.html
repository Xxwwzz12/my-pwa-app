<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>AI Чат</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent;
    }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; 
      flex-direction: column; 
      height: 100vh;
      background: #f8f9fa;
      color: #333;
    }
    
    #chat-header {
      background: #4263eb;
      color: white;
      padding: 16px 0;
      text-align: center;
      position: relative;
      flex-shrink: 0;
      font-weight: 500;
      font-size: 18px;
    }
    
    #back-btn {
      position: absolute;
      left: 12px;
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
    }
    
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    
    .message {
      max-width: 85%;
      padding: 12px 16px;
      margin: 10px 0;
      border-radius: 18px;
      font-size: 16px;
    }
    
    .user-message {
      background: #4263eb;
      color: white;
      margin-left: auto;
    }
    
    .bot-message {
      background: #e9ecef;
      margin-right: auto;
    }
    
    .input-area {
      display: flex;
      padding: 12px;
      border-top: 1px solid #e9ecef;
      background: white;
      flex-shrink: 0;
    }
    
    #user-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #e9ecef;
      border-radius: 25px;
      font-size: 16px;
    }
    
    #send-btn {
      margin-left: 12px;
      padding: 12px 20px;
      background: #4263eb;
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="chat-header">
    <button id="back-btn">←</button>
    <span>AI Чат</span>
  </div>
  
  <div id="chat-container"></div>
  
  <div class="input-area">
    <input type="text" id="user-input" placeholder="Введите сообщение...">
    <button id="send-btn">Отправить</button>
  </div>

  <script>
    // Глобальное логирование
    const logs = [];
    
    function log(message) {
      const timestamp = new Date().toLocaleTimeString();
      const logEntry = `[${timestamp}] ${message}`;
      logs.push(logEntry);
      console.log(logEntry);
    }
    
    // Инициализация
    log('Запуск страницы чата');
    
    try {
      const chatContainer = document.getElementById('chat-container');
      const userInput = document.getElementById('user-input');
      const sendBtn = document.getElementById('send-btn');
      const backBtn = document.getElementById('back-btn');
      
      // Добавление сообщения
      function addMessage(text, isUser) {
        const msg = document.createElement('div');
        msg.className = isUser ? 'message user-message' : 'message bot-message';
        msg.textContent = text;
        chatContainer.appendChild(msg);
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }
      
      // Отправка сообщения
      function handleSend() {
        const msg = userInput.value.trim();
        if (!msg) return;
        
        addMessage(msg, true);
        userInput.value = '';
        
        // Заглушка вместо реального AI
        setTimeout(() => {
          addMessage("Это демо-версия чата. Реальный AI будет подключен позже.", false);
        }, 1000);
      }
      
      // Обработчики событий
      sendBtn.addEventListener('click', handleSend);
      userInput.addEventListener('keypress', e => {
        if (e.key === 'Enter') handleSend();
      });
      
      backBtn.addEventListener('click', () => {
        window.location.href = 'index.html';
      });
      
      // Приветствие
      addMessage("Привет! Я ваш AI-помощник. Чем могу помочь?", false);
      
      log('Инициализация чата завершена');
    } catch (e) {
      log(`ОШИБКА ЧАТА: ${e.message}`);
      document.getElementById('chat-container').innerHTML = 
        '<p style="color:red; padding:20px; text-align:center">Ошибка инициализации чата</p>';
    }
  </script>
</body>
</html>
