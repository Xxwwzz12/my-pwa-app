<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Семейный чат | FamilySpace</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    :root {
      --primary: #ffffff;
      --primary-dark: #1a1a1a;
      --accent: #4263eb;
      --danger: #ff6b6b;
      --success: #40c057;
      --warning: #ffd43b;
      --background: #0a0a0a;
      --surface: #121212;
      --card-bg: #1e1e1e;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --text-tertiary: #8a8a8a;
      --border: #2a2a2a;
      --shadow: rgba(0, 0, 0, 0.4);
    }
    
    [data-theme="light"] {
      --primary: #000000;
      --primary-dark: #f0f0f0;
      --background: #f5f5f5;
      --surface: #ffffff;
      --card-bg: #ffffff;
      --text-primary: #121212;
      --text-secondary: #5a5a5a;
      --text-tertiary: #8a8a8a;
      --border: #e0e0e0;
      --shadow: rgba(0, 0, 0, 0.08);
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      height: 100vh;
      background: var(--background);
      padding: 0;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: var(--text-primary);
      transition: background 0.3s ease;
    }
    
    .header {
      padding: 16px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    
    .back-button {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card-bg);
      margin-right: 12px;
      cursor: pointer;
      transition: transform 0.2s;
      border: 1px solid var(--border);
    }
    
    .back-button:active {
      transform: scale(0.9);
    }
    
    .header-info {
      flex: 1;
    }
    
    .chat-name {
      font-size: 18px;
      font-weight: 600;
    }
    
    .chat-status {
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    .header-actions {
      display: flex;
      gap: 10px;
    }
    
    .action-button {
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 24px;
      cursor: pointer;
      padding: 5px;
    }
    
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
      padding-bottom: 80px;
    }
    
    .message {
      max-width: 85%;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeIn 0.3s forwards;
    }
    
    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .message-outgoing {
      align-self: flex-end;
      align-items: flex-end;
    }
    
    .message-incoming {
      align-self: flex-start;
      align-items: flex-start;
    }
    
    .message-bubble {
      padding: 14px 18px;
      border-radius: 18px;
      margin-bottom: 8px;
      position: relative;
      word-wrap: break-word;
      line-height: 1.5;
      font-size: 16px;
      box-shadow: 0 2px 8px var(--shadow);
    }
    
    .outgoing-bubble {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }
    
    .incoming-bubble {
      background: var(--card-bg);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }
    
    .message-info {
      display: flex;
      align-items: center;
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .message-time {
      margin: 0 5px;
    }
    
    .message-status {
      font-size: 14px;
    }
    
    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      margin-right: 10px;
      font-size: 14px;
    }
    
    .typing-indicator {
      display: none;
      background: var(--card-bg);
      padding: 14px 18px;
      border-radius: 18px;
      margin-bottom: 20px;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }
    
    .typing-indicator span {
      height: 8px;
      width: 8px;
      background: var(--text-secondary);
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
      animation: typing 1s infinite;
    }
    
    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }
    
    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }
    
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      position: sticky;
      bottom: 0;
      z-index: 5;
    }
    
    .message-input {
      flex: 1;
      background: var(--card-bg);
      border-radius: 24px;
      padding: 14px 20px;
      border: 1px solid var(--border);
      font-size: 16px;
      color: var(--text-primary);
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      transition: all 0.3s;
      box-shadow: 0 2px 8px var(--shadow);
    }
    
    .message-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(66, 99, 235, 0.2);
    }
    
    .send-button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 12px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      box-shadow: 0 2px 8px var(--shadow);
    }
    
    .send-button:active {
      transform: scale(0.9);
    }
    
    .send-button:disabled {
      background: var(--text-secondary);
      cursor: not-allowed;
      transform: none;
    }
    
    .attachment-button {
      margin-right: 12px;
    }
    
    .nav-bar {
      display: flex;
      justify-content: space-around;
      padding: 15px 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }
    
    .nav-icon {
      font-size: 24px;
      margin-bottom: 5px;
    }
    
    .nav-label {
      font-size: 12px;
    }
    
    .active .nav-icon,
    .active .nav-label {
      color: var(--accent);
    }
    
    .home-indicator {
      width: 140px;
      height: 5px;
      background: var(--text-primary);
      border-radius: 3px;
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="back-button" id="back-button">
      <i>←</i>
    </div>
    <div class="header-info">
      <div class="chat-name">Семейный чат</div>
      <div class="chat-status">онлайн • 4 участника</div>
    </div>
    <div class="header-actions">
      <button class="action-button">📞</button>
      <button class="action-button">⋮</button>
    </div>
  </div>
  
  <div class="chat-container" id="chat-container">
    <div class="message message-incoming">
      <div class="message-avatar">М</div>
      <div class="message-bubble incoming-bubble">
        Привет всем! Кто будет завтра на ужине?
      </div>
      <div class="message-info">
        <div class="message-author">Мария</div>
        <div class="message-time">18:30</div>
      </div>
    </div>
    
    <div class="message message-outgoing">
      <div class="message-bubble outgoing-bubble">
        Я буду точно! Что нужно принести?
      </div>
      <div class="message-info">
        <div class="message-time">18:32</div>
        <div class="message-status">✓✓</div>
      </div>
    </div>
    
    <div class="message message-incoming">
      <div class="message-avatar">П</div>
      <div class="message-bubble incoming-bubble">
        Мы с Анной тоже придем. Может, приготовить десерт?
      </div>
      <div class="message-info">
        <div class="message-author">Петр</div>
        <div class="message-time">18:33</div>
      </div>
    </div>
    
    <div class="message message-incoming">
      <div class="message-avatar">А</div>
      <div class="message-bubble incoming-bubble">
        Да, я как раз испекла новый торт! 🍰
      </div>
      <div class="message-info">
        <div class="message-author">Анна</div>
        <div class="message-time">18:35</div>
      </div>
    </div>
    
    <div class="typing-indicator" id="typing-indicator">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
  
  <div class="input-area">
    <button class="action-button attachment-button">📎</button>
    <textarea 
      class="message-input" 
      id="message-input" 
      placeholder="Напишите сообщение..." 
      rows="1"></textarea>
    <button class="send-button" id="send-button">
      <i>↑</i>
    </button>
  </div>
  
  <div class="nav-bar">
    <div class="nav-item">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Главная</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">🔔</div>
      <div class="nav-label">Уведом.</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">🎁</div>
      <div class="nav-label">Вишлист</div>
    </div>
    <div class="nav-item active">
      <div class="nav-icon">💬</div>
      <div class="nav-label">Чат</div>
    </div>
  </div>
  
  <div class="home-indicator"></div>

  <script>
    // Инициализация приложения
    function initChatApp() {
      // Установка темы из localStorage
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      
      // Навигация назад
      document.getElementById('back-button').addEventListener('click', () => {
        window.history.back();
      });
      
      // Элементы интерфейса
      const chatContainer = document.getElementById('chat-container');
      const messageInput = document.getElementById('message-input');
      const sendButton = document.getElementById('send-button');
      const typingIndicator = document.getElementById('typing-indicator');
      
      // Обработка отправки сообщения
      function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) return;
        
        // Добавляем сообщение в чат
        addMessage(message, 'outgoing');
        
        // Очистка поля ввода
        messageInput.value = '';
        messageInput.style.height = 'auto';
        
        // Прокрутка вниз
        scrollToBottom();
        
        // Имитация ответа
        setTimeout(() => {
          simulateReply();
        }, 2000);
      }
      
      // Добавление сообщения в чат
      function addMessage(text, type) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message message-${type}`;
        
        if (type === 'incoming') {
          const randomUser = getRandomFamilyMember();
          messageDiv.innerHTML = `
            <div class="message-avatar">${randomUser.avatar}</div>
            <div class="message-bubble incoming-bubble">${text}</div>
            <div class="message-info">
              <div class="message-author">${randomUser.name}</div>
              <div class="message-time">${getCurrentTime()}</div>
            </div>
          `;
        } else {
          messageDiv.innerHTML = `
            <div class="message-bubble outgoing-bubble">${text}</div>
            <div class="message-info">
              <div class="message-time">${getCurrentTime()}</div>
              <div class="message-status">✓✓</div>
            </div>
          `;
        }
        
        chatContainer.appendChild(messageDiv);
        
        // Прокрутка вниз
        scrollToBottom();
      }
      
      // Имитация ответа от члена семьи
      function simulateReply() {
        // Показываем индикатор набора
        typingIndicator.style.display = 'flex';
        scrollToBottom();
        
        // Через 1-3 секунды отправляем ответ
        const delay = 1000 + Math.random() * 2000;
        setTimeout(() => {
          typingIndicator.style.display = 'none';
          
          const replies = [
            "Отличная идея!",
            "Давайте обсудим это на ужине.",
            "Я добавлю это в наш список покупок.",
            "Кто-нибудь уже купил подарок на день рождения?",
            "Напомните, во сколько мы встречаемся?",
            "Я могу помочь с организацией."
          ];
          
          const randomReply = replies[Math.floor(Math.random() * replies.length)];
          addMessage(randomReply, 'incoming');
        }, delay);
      }
      
      // Получение случайного члена семьи
      function getRandomFamilyMember() {
        const members = [
          { name: "Мария", avatar: "М" },
          { name: "Петр", avatar: "П" },
          { name: "Анна", avatar: "А" },
          { name: "Дед Иван", avatar: "И" }
        ];
        return members[Math.floor(Math.random() * members.length)];
      }
      
      // Получение текущего времени
      function getCurrentTime() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        return `${hours}:${minutes}`;
      }
      
      // Прокрутка вниз
      function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }
      
      // Обработчики событий
      sendButton.addEventListener('click', sendMessage);
      
      messageInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      
      messageInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
      });
      
      // Навигация
      const navItems = document.querySelectorAll('.nav-item');
      navItems.forEach(item => {
        item.addEventListener('click', function() {
          navItems.forEach(i => i.classList.remove('active'));
          this.classList.add('active');
          
          if (this.querySelector('.nav-icon').textContent === '🏠') {
            window.location.href = 'family.html';
          } else if (this.querySelector('.nav-icon').textContent === '🎁') {
            window.location.href = 'wishlist.html';
          } else if (this.querySelector('.nav-icon').textContent === '🔔') {
            alert('Раздел "Уведомления" в разработке');
          }
        });
      });
      
      // Прокрутка вниз при загрузке
      setTimeout(scrollToBottom, 100);
    }
    
    // Запуск приложения после загрузки
    window.addEventListener('DOMContentLoaded', initChatApp);
  </script>
</body>
</html>
