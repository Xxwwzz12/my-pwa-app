<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4263eb">
  <title>Моя семья | FamilySpace</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Обновленные стили для плиточного интерфейса */
    .status-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 10px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
    }
    
    .status-left, .status-right {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 14px;
    }
    
    .battery {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .home-screen {
      padding: 80px 15px 30px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }
    
    .app-tile {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 15px 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      box-shadow: var(--glass-shadow);
      aspect-ratio: 1/1;
    }
    
    .app-tile:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }
    
    .app-tile:active {
      transform: translateY(0) scale(0.98);
    }
    
    .app-icon {
      width: 50px;
      height: 50px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: var(--primary);
      border: 1px solid var(--glass-border);
    }
    
    .app-name {
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      color: var(--text-primary);
    }
    
    .notification-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: var(--danger);
      color: white;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }
    
    /* Анимации */
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    
    .app-tile.new-notification {
      animation: pulse 1s ease infinite;
    }
    
    /* Адаптивность */
    @media (max-width: 768px) {
      .home-screen {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    
    @media (max-width: 480px) {
      .home-screen {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }
    }
    
    /* Fallback для браузеров без поддержки backdrop-filter */
    @supports not (backdrop-filter: blur(12px)) {
      .app-tile, .status-bar {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        background: var(--surface) !important;
      }
    }
  </style>
</head>
<body>
  <!-- Статус бар -->
  <div class="status-bar">
    <div class="status-left">
      <span id="current-time">12:30</span>
    </div>
    <div class="status-right">
      <div class="network">
        <i class="fas fa-wifi"></i>
      </div>
      <div class="battery">
        <i class="fas fa-battery-full"></i>
        <span>92%</span>
      </div>
    </div>
  </div>
  
  <!-- Плитки приложений -->
  <div class="home-screen" id="app-grid">
    <!-- Приложения будут добавляться динамически -->
  </div>

  <script>
    // Инициализация домашнего экрана
    function initHomeScreen() {
      // Установка темы
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      
      // Обновление времени
      function updateTime() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        document.getElementById('current-time').textContent = `${hours}:${minutes}`;
      }
      
      setInterval(updateTime, 60000);
      updateTime();
      
      // Список приложений
      const apps = [
        { 
          id: 'family-chat', 
          name: 'Чат', 
          icon: 'fas fa-comments', 
          badge: 3,
          url: 'family-chat.html'
        },
        { 
          id: 'calendar', 
          name: 'Календарь', 
          icon: 'fas fa-calendar', 
          badge: 2,
          url: 'calendar.html'
        },
        { 
          id: 'wishlist', 
          name: 'Вишлист', 
          icon: 'fas fa-gift', 
          badge: 1,
          url: 'wishlist.html'
        },
        { 
          id: 'tasks', 
          name: 'Задачи', 
          icon: 'fas fa-tasks', 
          badge: 0,
          url: 'tasks.html'
        },
        { 
          id: 'family-management', 
          name: 'Семья', 
          icon: 'fas fa-users', 
          badge: 0,
          url: 'family-management.html'
        },
        { 
          id: 'menu', 
          name: 'Меню', 
          icon: 'fas fa-utensils', 
          badge: 0,
          url: 'menu.html'
        },
        { 
          id: 'pets', 
          name: 'Питомцы', 
          icon: 'fas fa-paw', 
          badge: 0,
          url: 'pets.html'
        },
        { 
          id: 'profile', 
          name: 'Профиль', 
          icon: 'fas fa-user', 
          badge: 0,
          url: 'profile.html'
        },
        { 
          id: 'settings', 
          name: 'Настройки', 
          icon: 'fas fa-cog', 
          badge: 0,
          url: 'settings.html'
        },
        { 
          id: 'ai-chat', 
          name: 'ИИ Помощник', 
          icon: 'fas fa-robot', 
          badge: 0,
          url: 'ai-chat.html'
        }
      ];
      
      const appGrid = document.getElementById('app-grid');
      
      // Создание плиток приложений
      apps.forEach(app => {
        const appElement = document.createElement('div');
        appElement.className = 'app-tile';
        appElement.id = `app-${app.id}`;
        appElement.innerHTML = `
          <div class="app-icon">
            <i class="${app.icon}"></i>
          </div>
          <div class="app-name">${app.name}</div>
          ${app.badge > 0 ? `<div class="notification-badge">${app.badge}</div>` : ''}
        `;
        
        // Обработчик клика
        appElement.addEventListener('click', () => {
          // Анимация нажатия
          appElement.classList.add('active');
          setTimeout(() => appElement.classList.remove('active'), 200);
          
          // Переход на страницу приложения
          if (app.url) {
            window.location.href = app.url;
          } else {
            alert(`Раздел "${app.name}" в разработке`);
          }
        });
        
        appGrid.appendChild(appElement);
      });
      
      // Загрузка реальных уведомлений
      async function loadNotifications() {
        try {
          const response = await fetch('/api/notifications');
          if (!response.ok) throw new Error('Ошибка загрузки уведомлений');
          const notifications = await response.json();
          
          notifications.forEach(notif => {
            const appElement = document.getElementById(`app-${notif.appId}`);
            if (appElement) {
              const badge = appElement.querySelector('.notification-badge');
              
              if (badge) {
                const count = parseInt(badge.textContent) + notif.count;
                badge.textContent = count > 9 ? '9+' : count;
              } else {
                const badgeElement = document.createElement('div');
                badgeElement.className = 'notification-badge';
                badgeElement.textContent = notif.count > 9 ? '9+' : notif.count;
                appElement.appendChild(badgeElement);
              }
              
              // Анимация пульсации
              appElement.classList.add('new-notification');
              setTimeout(() => appElement.classList.remove('new-notification'), 3000);
            }
          });
        } catch (error) {
          console.error('Ошибка загрузки уведомлений:', error);
        }
      }
      
      // Загрузка уведомлений
      loadNotifications();
    }
    
    // Запуск после загрузки
    window.addEventListener('DOMContentLoaded', initHomeScreen);
  </script>
</body>
</html>
