<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4f46e5">
  <title>Моя семья | FamilySpace</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Специфичные стили только для family.html */
    .family-container {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }
    
    .family-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }
    
    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .family-member {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      border: 1px solid var(--border);
      box-shadow: 0 4px 12px var(--shadow);
      transition: transform 0.2s;
    }
    
    .family-member:hover {
      transform: translateY(-3px);
    }
    
    .member-avatar {
      position: relative;
      margin-right: 15px;
    }
    
    .member-avatar img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--accent);
    }
    
    .status-indicator {
      position: absolute;
      bottom: 5px;
      right: 5px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--card-bg);
    }
    
    .status-indicator.online {
      background: var(--success);
    }
    
    .status-indicator.away {
      background: var(--warning);
    }
    
    .status-indicator.offline {
      background: var(--text-tertiary);
    }
    
    .member-info {
      flex: 1;
    }
    
    .member-info h3 {
      font-size: 1.1rem;
      margin-bottom: 5px;
    }
    
    .member-info p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 8px;
    }
    
    .member-meta {
      font-size: 0.8rem;
      color: var(--text-tertiary);
      display: flex;
      flex-direction: column;
    }
    
    .member-actions {
      display: flex;
      align-items: center;
    }
    
    .icon-btn {
      background: none;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    
    .icon-btn:hover {
      background: var(--surface);
      color: var(--accent);
    }
    
    .family-events h2 {
      margin-bottom: 15px;
      font-size: 1.3rem;
    }
    
    .events-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
    }
    
    .event-card {
      display: flex;
      background: var(--card-bg);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    
    .event-date {
      min-width: 70px;
      background: var(--accent);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    
    .event-date .day {
      font-size: 1.8rem;
      font-weight: 600;
      line-height: 1;
    }
    
    .event-date .month {
      font-size: 0.9rem;
      text-transform: uppercase;
    }
    
    .event-details {
      padding: 15px;
      flex: 1;
    }
    
    .event-details h3 {
      font-size: 1.1rem;
      margin-bottom: 5px;
    }
    
    .event-details p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 10px;
    }
    
    .event-meta {
      display: flex;
      gap: 15px;
      font-size: 0.85rem;
      color: var(--text-tertiary);
    }
    
    .family-member.pending .member-avatar img {
      border-color: var(--warning);
    }
    
    .family-member.pending .member-info p {
      color: var(--warning);
    }
    
    @media (max-width: 768px) {
      .members-grid {
        grid-template-columns: 1fr;
      }
      
      .family-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }
      
      .event-card {
        flex-direction: column;
      }
      
      .event-date {
        flex-direction: row;
        justify-content: flex-start;
        gap: 15px;
        min-height: auto;
        padding: 10px 15px;
      }
    }
  </style>
</head>
<body>
  <!-- Общая шапка приложения -->
  <header class="app-header">
    <div class="header-container">
      <a href="/family.html" class="logo">
        <img src="/icons/logo.svg" alt="FamilySpace">
        <span>FamilySpace</span>
      </a>
      
      <nav class="main-nav">
        <ul>
          <li class="active"><a href="/family.html">Семья</a></li>
          <li><a href="/calendar.html">Календарь</a></li>
          <li><a href="/tasks.html">Задачи</a></li>
          <li><a href="/wishlist.html">Вишлист</a></li>
          <li><a href="/family-chat.html">Чат</a></li>
        </ul>
      </nav>
      
      <div class="user-controls">
        <div class="user-avatar">
          <img id="current-user-avatar" src="/icons/default-avatar.svg" alt="Ваш аватар">
          <div class="status-indicator online"></div>
        </div>
        <div class="dropdown-menu">
          <a href="/profile.html">Профиль</a>
          <a href="/family-management.html">Управление семьей</a>
          <a href="/logout">Выйти</a>
        </div>
        <button class="menu-toggle" aria-label="Открыть меню">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- Основное содержимое страницы -->
  <main class="family-container">
    <section class="family-header">
      <h1>Наша семья</h1>
      <button id="invite-member-btn" class="btn-primary">
        <i class="fas fa-user-plus"></i>
        Пригласить участника
      </button>
    </section>

    <div class="members-grid" id="members-grid">
      <!-- Члены семьи будут загружаться динамически -->
    </div>

    <section class="family-events">
      <h2>Ближайшие семейные события</h2>
      <div class="events-list" id="events-list">
        <!-- События будут загружаться динамически -->
      </div>
    </section>
  </main>

  <!-- Общий футер -->
  <footer class="app-footer">
    <p>© 2025 FamilySpace. Все права защищены.</p>
    <div class="footer-links">
      <a href="#">Политика конфиденциальности</a>
      <a href="#">Условия использования</a>
    </div>
  </footer>

  <script>
    // Инициализация меню пользователя
    document.querySelector('.user-avatar').addEventListener('click', function() {
      this.nextElementSibling.classList.toggle('show');
    });

    // Инициализация мобильного меню
    document.querySelector('.menu-toggle').addEventListener('click', function() {
      document.querySelector('.main-nav').classList.toggle('active');
      this.classList.toggle('active');
    });

    // Загрузка данных пользователя и семьи
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        // Загрузка данных пользователя
        const userResponse = await fetch('/api/user');
        if (!userResponse.ok) throw new Error('Ошибка загрузки данных пользователя');
        const userData = await userResponse.json();
        
        // Обновление аватара в шапке
        const userAvatar = document.getElementById('current-user-avatar');
        if (userData.avatar) {
          userAvatar.src = userData.avatar.startsWith('http') ? 
            userData.avatar : 
            `/uploads/${userData.avatar}`;
        }
        
        // Загрузка данных семьи
        const familyResponse = await fetch('/api/family');
        if (!familyResponse.ok) throw new Error('Ошибка загрузки данных семьи');
        const familyData = await familyResponse.json();
        
        // Рендеринг членов семьи
        renderFamilyMembers(familyData.members);
        
        // Рендеринг событий
        renderFamilyEvents(familyData.events);
        
        // Обработчик кнопки приглашения
        document.getElementById('invite-member-btn').addEventListener('click', () => {
          alert('Функция приглашения скоро будет доступна');
        });
        
      } catch (error) {
        console.error('Ошибка загрузки данных:', error);
        showErrorNotification('Не удалось загрузить данные семьи');
      }
    });

    // Функция рендеринга членов семьи
    function renderFamilyMembers(members) {
      const membersGrid = document.getElementById('members-grid');
      if (!membersGrid) return;
      
      membersGrid.innerHTML = '';
      
      members.forEach(member => {
        const memberElement = document.createElement('div');
        memberElement.className = `family-member ${member.status === 'pending' ? 'pending' : ''}`;
        
        memberElement.innerHTML = `
          <div class="member-avatar">
            <img src="${getAvatarUrl(member.avatar)}" alt="${member.name}">
            <div class="status-indicator ${getStatusClass(member.status)}"></div>
          </div>
          <div class="member-info">
            <h3>${member.name}</h3>
            <p>${member.role}</p>
            <div class="member-meta">
              <span>${getStatusText(member.status)}</span>
              ${member.lastActive ? `<span>Активен ${member.lastActive}</span>` : ''}
            </div>
          </div>
          <div class="member-actions">
            <button class="icon-btn" title="Написать сообщение">
              <i class="fas fa-comment"></i>
            </button>
          </div>
        `;
        
        // Обработчик кнопки сообщения
        memberElement.querySelector('.icon-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          window.location.href = `/family-chat.html?user=${member.id}`;
        });
        
        membersGrid.appendChild(memberElement);
      });
    }

    // Функция рендеринга событий
    function renderFamilyEvents(events) {
      const eventsList = document.getElementById('events-list');
      if (!eventsList) return;
      
      eventsList.innerHTML = '';
      
      events.forEach(event => {
        const eventDate = new Date(event.date);
        const now = new Date();
        const daysLeft = Math.ceil((eventDate - now) / (1000 * 60 * 60 * 24));
        
        const eventElement = document.createElement('div');
        eventElement.className = 'event-card';
        
        eventElement.innerHTML = `
          <div class="event-date">
            <span class="day">${eventDate.getDate()}</span>
            <span class="month">${getMonthName(eventDate.getMonth())}</span>
          </div>
          <div class="event-details">
            <h3>${event.title}</h3>
            <p>Осталось ${daysLeft} ${getDayText(daysLeft)}</p>
            <div class="event-meta">
              <span>Участники: ${event.participants}</span>
              ${event.gifts ? `<span>Подарки: ${event.gifts}</span>` : ''}
            </div>
          </div>
        `;
        
        eventsList.appendChild(eventElement);
      });
    }

    // Вспомогательные функции
    function getAvatarUrl(avatar) {
      if (!avatar) return '/icons/default-avatar.svg';
      return avatar.startsWith('http') ? avatar : `/uploads/${avatar}`;
    }
    
    function getStatusClass(status) {
      switch(status) {
        case 'online': return 'online';
        case 'away': return 'away';
        case 'offline': return 'offline';
        case 'pending': return 'offline';
        default: return 'offline';
      }
    }
    
    function getStatusText(status) {
      switch(status) {
        case 'online': return 'В сети';
        case 'away': return 'Не активен';
        case 'offline': return 'Не в сети';
        case 'pending': return 'Ожидает подтверждения';
        default: return '';
      }
    }
    
    function getMonthName(monthIndex) {
      const months = ['Янв', 'Фев', 'Мар', 'Апр', 'Май', 'Июн', 'Июл', 'Авг', 'Сен', 'Окт', 'Ноя', 'Дек'];
      return months[monthIndex];
    }
    
    function getDayText(days) {
      if (days % 10 === 1 && days % 100 !== 11) return 'день';
      if ([2, 3, 4].includes(days % 10) && ![12, 13, 14].includes(days % 100)) return 'дня';
      return 'дней';
    }
    
    function showErrorNotification(message) {
      const notification = document.createElement('div');
      notification.className = 'notification error';
      notification.textContent = message;
      document.body.appendChild(notification);
      
      setTimeout(() => {
        notification.remove();
      }, 5000);
    }
  </script>
</body>
</html>
