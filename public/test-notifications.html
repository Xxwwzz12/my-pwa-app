<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тестирование API Уведомлений</title>
    <script>
        async function testNotifications() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Выполняю запрос...';
            
            try {
                const sessionCookie = 's:_X5evIKgtBbN-VlzUvRVpxqr8u8Q4Rpq.VRmJQd4j3YolCcczBmOGuZTCxWh4ceZaGAgTMSqUa9A';
                
                const response = await fetch('https://my-pwa-app-w519.onrender.com/api/notifications', {
                    headers: { 'Cookie': `connect.sid=${sessionCookie}` },
                    credentials: 'include'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    resultDiv.innerHTML = `Ошибка: ${response.status}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `Ошибка: ${error.message}`;
            }
        }
        window.onload = testNotifications;
    </script>
</head>
<body>
    <h1>Тестирование API Уведомлений</h1>
    <div id="result">Загрузка...</div>
</body>
</html>
