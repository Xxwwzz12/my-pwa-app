<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Семейное пространство</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    :root {
      --primary: #ffffff;
      --primary-dark: #1a1a1a;
      --accent: #4263eb;
      --danger: #ff6b6b;
      --success: #40c057;
      --warning: #ffd43b;
      --background: #0a0a0a;
      --surface: #121212;
      --card-bg: #1e1e1e;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --text-tertiary: #8a8a8a;
      --border: #2a2a2a;
      --shadow: rgba(0, 0, 0, 0.4);
    }
    
    [data-theme="light"] {
      --primary: #000000;
      --primary-dark: #f0f0f0;
      --background: #f5f5f5;
      --surface: #ffffff;
      --card-bg: #ffffff;
      --text-primary: #121212;
      --text-secondary: #5a5a5a;
      --text-tertiary: #8a8a8a;
      --border: #e0e0e0;
      --shadow: rgba(0, 0, 0, 0.08);
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      min-height: 100vh; /* Изменено с height на min-height */
      background: var(--background);
      padding: 0;
      display: flex;
      flex-direction: column;
      color: var(--text-primary);
      transition: background 0.3s ease;
      overflow-x: hidden; /* Скрываем горизонтальный скролл */
    }
    
    .header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--background);
      z-index: 10;
    }
    
    .logo {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
      color: var(--accent);
    }
    
    .tagline {
      color: var(--text-secondary);
      font-size: 16px;
    }
    
    .main-content {
      flex: 1;
      overflow-y: auto; /* Разрешаем скроллинг контента */
      padding-bottom: 20px;
    }
    
    .auth-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 30px;
      min-height: 400px; /* Минимальная высота для контента */
    }
    
    .auth-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 24px var(--shadow);
      border: 1px solid var(--border);
      max-width: 500px;
      margin: 0 auto;
      width: 100%;
    }
    
    .auth-title {
      font-size: 22px;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    .input-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text-primary);
    }
    
    .input-field {
      width: 100%;
      padding: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      color: var(--text-primary);
      transition: border-color 0.3s;
    }
    
    .input-field:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .auth-button {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }
    
    .auth-button:hover {
      background: #364fc7;
    }
    
    /* Новые стили для кнопки Google */
    .google-login-container {
      margin-top: 20px;
      text-align: center;
    }
    
    .divider {
      position: relative;
      margin: 20px 0;
      color: var(--text-tertiary);
      text-align: center;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }
    
    .divider::before {
      left: 0;
    }
    
    .divider::after {
      right: 0;
    }
    
    .google-login-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      transition: background 0.3s;
    }
    
    .google-login-button:hover {
      background: var(--card-bg);
    }
    
    .google-login-button img {
      width: 20px;
      height: 20px;
      margin-right: 10px;
    }
    
    .auth-toggle {
      text-align: center;
      margin-top: 20px;
      color: var(--text-secondary);
    }
    
    .auth-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      margin-left: 5px;
    }
    
    .features {
      padding: 30px 20px;
      text-align: center;
    }
    
    .features-title {
      font-size: 20px;
      margin-bottom: 25px;
    }
    
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px;
      max-width: 500px;
      margin: 0 auto;
    }
    
    .feature-card {
      background: var(--card-bg);
      border-radius: 14px;
      padding: 20px 15px;
      text-align: center;
      border: 1px solid var(--border);
      box-shadow: 0 4px 12px var(--shadow);
    }
    
    .feature-icon {
      font-size: 32px;
      margin-bottom: 12px;
      color: var(--accent);
    }
    
    .feature-name {
      font-size: 14px;
      font-weight: 500;
    }
    
    .footer {
      padding: 20px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 14px;
      border-top: 1px solid var(--border);
      position: sticky;
      bottom: 0;
      background: var(--background);
      z-index: 10;
    }
    
    .version-info {
      margin-top: 10px;
    }
    
    .home-indicator {
      width: 140px;
      height: 5px;
      background: var(--text-primary);
      border-radius: 3px;
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0.3;
    }
    
    /* Медиа-запросы для адаптивности */
    @media (max-height: 700px) {
      .auth-container {
        min-height: 300px;
        padding: 20px;
      }
      
      .features {
        padding: 20px 15px;
      }
    }
    
    @media (max-height: 600px) {
      .features {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">FamilySpace</div>
    <div class="tagline">Ваше семейное пространство в одном приложении</div>
  </div>
  
  <div class="main-content">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-title">Вход в систему</div>
        
        <div class="input-group">
          <label class="input-label">Электронная почта</label>
          <input type="email" class="input-field" placeholder="your@email.com">
        </div>
        
        <div class="input-group">
          <label class="input-label">Пароль</label>
          <input type="password" class="input-field" placeholder="Введите пароль">
        </div>
        
        <button class="auth-button">Войти</button>
        
        <!-- Кнопка входа через Google -->
        <div class="google-login-container">
          <div class="divider">или</div>
          <button id="google-login" class="google-login-button">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
            Войти через Google
          </button>
        </div>
        
        <div class="auth-toggle">
          Нет аккаунта? <a href="#" class="auth-link">Зарегистрироваться</a>
        </div>
      </div>
    </div>
    
    <div class="features">
      <div class="features-title">Возможности приложения</div>
      <div class="feature-grid">
        <div class="feature-card">
          <div class="feature-icon">🎁</div>
          <div class="feature-name">Вишлисты</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">👨‍👩‍👧</div>
          <div class="feature-name">Семейное пространство</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">🗓️</div>
          <div class="feature-name">Календарь</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">✅</div>
          <div class="feature-name">Задачи</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">💬</div>
          <div class="feature-name">Семейный чат</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">🤖</div>
          <div class="feature-name">ИИ-помощник</div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="footer">
    <div>FamilySpace &copy; 2025</div>
    <div class="version-info">Версия 3.0</div>
  </div>
  
  <div class="home-indicator"></div>

  <script>
    // Конфигурация приложения
    const APP_VERSION = "3.0";
    
    // Инициализация приложения
    function initApp() {
      // Установка темы из localStorage
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      
      // Переключение между входом и регистрацией
      const authLink = document.querySelector('.auth-link');
      authLink.addEventListener('click', (e) => {
        e.preventDefault();
        const authTitle = document.querySelector('.auth-title');
        const authButton = document.querySelector('.auth-button');
        
        if (authTitle.textContent === 'Вход в систему') {
          authTitle.textContent = 'Регистрация';
          authButton.textContent = 'Зарегистрироваться';
          authLink.previousSibling.textContent = 'Уже есть аккаунт? ';
          authLink.textContent = 'Войти';
        } else {
          authTitle.textContent = 'Вход в систему';
          authButton.textContent = 'Войти';
          authLink.previousSibling.textContent = 'Нет аккаунта? ';
          authLink.textContent = 'Зарегистрироваться';
        }
      });
      
      // Обработчик для кнопки Google Login
      const googleLoginButton = document.getElementById('google-login');
      googleLoginButton.addEventListener('click', () => {
        window.location.href = '/auth/google';
      });
      
      // Обработка формы
      const authButton = document.querySelector('.auth-button');
      authButton.addEventListener('click', () => {
        window.location.href = 'family.html';
      });
    }
    
    // Запуск приложения после загрузки
    window.addEventListener('DOMContentLoaded', initApp);
  </script>
  
  <!-- Скрипт для работы с Service Worker -->
  <script>
    // Регистрация Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const registration = await navigator.serviceWorker.register('/sw.js');
          
          console.log('ServiceWorker зарегистрирован с областью видимости: ', registration.scope);
          
          // Принудительное обновление при изменении версии
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('Новая версия обнаружена! Принудительное обновление...');
                newWorker.postMessage({type: 'SKIP_WAITING'});
              }
            });
          });
          
          // Проверка версии при загрузке
          navigator.serviceWorker.controller?.postMessage({
            type: 'CHECK_VERSION',
            version: APP_VERSION
          });
          
          // Периодическая проверка обновлений (каждый час)
          setInterval(() => {
            registration.update().then(() => {
              console.log('Фоновая проверка обновлений выполнена');
            });
          }, 60 * 60 * 1000);
          
        } catch (error) {
          console.error('Ошибка регистрации Service Worker: ', error);
        }
      });
    }
    
    // Обработка сообщений от Service Worker
    navigator.serviceWorker.addEventListener('message', event => {
      switch (event.data.type) {
        case 'RELOAD_REQUIRED':
          console.log('Требуется перезагрузка для применения обновления');
          if (confirm('Доступно обновление приложения. Перезагрузить сейчас?')) {
            window.location.reload();
          }
          break;
          
        case 'VERSION_MISMATCH':
          console.log(`Версия SW (${event.data.swVersion}) не совпадает с приложением (${APP_VERSION})`);
          navigator.serviceWorker.getRegistration().then(reg => {
            reg?.update();
          });
          break;
          
        case 'SW_LOG':
          console.log('[SW]', event.data.message);
          break;
      }
    });
  </script>
</body>
</html>
