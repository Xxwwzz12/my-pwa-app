<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4f46e5">
  <title>Семейное пространство | FamilySpace</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="manifest" href="/manifest.json">
  <style>
    /* Специфичные стили для страницы входа */
    .login-container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--background-gradient);
      padding: 20px;
    }
    
    .login-header {
      text-align: center;
      padding: 30px 0 20px;
    }
    
    .login-logo {
      font-size: 2.5rem;
      font-weight: bold;
      color: var(--accent);
      margin-bottom: 10px;
    }
    
    .login-tagline {
      color: var(--text-secondary);
      font-size: 1.1rem;
      max-width: 500px;
      margin: 0 auto;
    }
    
    .login-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 24px var(--shadow);
      border: 1px solid var(--border);
      max-width: 500px;
      margin: 20px auto 40px;
      width: 100%;
    }
    
    .auth-title {
      font-size: 1.8rem;
      margin-bottom: 25px;
      text-align: center;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    .input-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text-primary);
    }
    
    .input-field {
      width: 100%;
      padding: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      color: var(--text-primary);
      transition: border-color 0.3s;
    }
    
    .input-field:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .auth-button {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }
    
    .auth-button:hover {
      background: var(--accent-dark);
    }
    
    .google-login-container {
      margin-top: 25px;
      text-align: center;
    }
    
    .divider {
      position: relative;
      margin: 25px 0;
      color: var(--text-tertiary);
      text-align: center;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }
    
    .divider::before {
      left: 0;
    }
    
    .divider::after {
      right: 0;
    }
    
    .google-login-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      transition: background 0.3s;
    }
    
    .google-login-button:hover {
      background: var(--card-bg);
    }
    
    .google-logo {
      width: 20px;
      height: 20px;
      margin-right: 12px;
    }
    
    .auth-toggle {
      text-align: center;
      margin-top: 25px;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }
    
    .auth-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      margin-left: 5px;
    }
    
    .features-section {
      padding: 30px 20px;
      text-align: center;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .features-title {
      font-size: 1.8rem;
      margin-bottom: 35px;
      color: var(--text-primary);
    }
    
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
    }
    
    .feature-card {
      background: var(--card-bg);
      border-radius: 14px;
      padding: 25px 20px;
      text-align: center;
      border: 1px solid var(--border);
      box-shadow: 0 4px 12px var(--shadow);
      transition: transform 0.3s;
    }
    
    .feature-card:hover {
      transform: translateY(-5px);
    }
    
    .feature-icon {
      font-size: 2.5rem;
      margin-bottom: 15px;
      color: var(--accent);
    }
    
    .feature-name {
      font-size: 1.1rem;
      font-weight: 500;
    }
    
    .login-footer {
      padding: 20px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.9rem;
      margin-top: auto;
    }
    
    .version-info {
      margin-top: 10px;
    }
    
    @media (max-width: 768px) {
      .login-card {
        padding: 25px 20px;
      }
      
      .features-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 15px;
      }
      
      .feature-icon {
        font-size: 2rem;
      }
      
      .auth-title {
        font-size: 1.5rem;
      }
    }
    
    @media (max-width: 480px) {
      .login-logo {
        font-size: 2rem;
      }
      
      .feature-card {
        padding: 20px 15px;
      }
      
      .feature-name {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- Специальная шапка для страницы входа -->
  <div class="login-container">
    <header class="login-header">
      <div class="login-logo">FamilySpace</div>
      <div class="login-tagline">Ваше семейное пространство в одном приложении</div>
    </header>
    
    <main>
      <div class="login-card">
        <div class="auth-title">Вход в систему</div>
        
        <div class="input-group">
          <label class="input-label">Электронная почта</label>
          <input type="email" class="input-field" placeholder="your@email.com">
        </div>
        
        <div class="input-group">
          <label class="input-label">Пароль</label>
          <input type="password" class="input-field" placeholder="Введите пароль">
        </div>
        
        <button class="auth-button">Войти</button>
        
        <!-- Кнопка входа через Google -->
        <div class="google-login-container">
          <div class="divider">или</div>
          <button id="google-login" class="google-login-button">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" 
                 alt="Google" class="google-logo">
            Войти через Google
          </button>
        </div>
        
        <div class="auth-toggle">
          Нет аккаунта? <a href="/registration.html" class="auth-link">Зарегистрироваться</a>
        </div>
      </div>
      
      <div class="features-section">
        <div class="features-title">Возможности приложения</div>
        <div class="features-grid">
          <div class="feature-card">
            <div class="feature-icon">🎁</div>
            <div class="feature-name">Вишлисты</div>
          </div>
          <div class="feature-card">
            <div class="feature-icon">👨‍👩‍👧</div>
            <div class="feature-name">Семейное пространство</div>
          </div>
          <div class="feature-card">
            <div class="feature-icon">🗓️</div>
            <div class="feature-name">Календарь</div>
          </div>
          <div class="feature-card">
            <div class="feature-icon">✅</div>
            <div class="feature-name">Задачи</div>
          </div>
          <div class="feature-card">
            <div class="feature-icon">💬</div>
            <div class="feature-name">Семейный чат</div>
          </div>
          <div class="feature-card">
            <div class="feature-icon">🤖</div>
            <div class="feature-name">ИИ-помощник</div>
          </div>
        </div>
      </div>
    </main>
    
    <footer class="login-footer">
      <div>FamilySpace &copy; 2025</div>
      <div class="version-info">Версия 3.0</div>
    </footer>
  </div>

  <script>
    // Конфигурация приложения
    const APP_VERSION = "3.0";
    
    // Инициализация приложения
    function initApp() {
      // Установка темы из localStorage
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      
      // Обработчик для кнопки Google Login
      const googleLoginButton = document.getElementById('google-login');
      googleLoginButton.addEventListener('click', () => {
        window.location.href = '/auth/google';
      });
      
      // Обработка основной кнопки входа
      const authButton = document.querySelector('.auth-button');
      authButton.addEventListener('click', () => {
        // Здесь должна быть логика проверки данных
        // Пока просто переходим на страницу семьи
        window.location.href = 'family.html';
      });
    }
    
    // Запуск приложения после загрузки
    window.addEventListener('DOMContentLoaded', initApp);
  </script>
  
  <!-- Скрипт для работы с Service Worker -->
  <script>
    // Регистрация Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const registration = await navigator.serviceWorker.register('/sw.js');
          
          console.log('ServiceWorker зарегистрирован с областью видимости: ', registration.scope);
          
          // Принудительное обновление при изменении версии
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('Новая версия обнаружена! Принудительное обновление...');
                newWorker.postMessage({type: 'SKIP_WAITING'});
              }
            });
          });
          
          // Проверка версии при загрузке
          navigator.serviceWorker.controller?.postMessage({
            type: 'CHECK_VERSION',
            version: APP_VERSION
          });
          
          // Периодическая проверка обновлений (каждый час)
          setInterval(() => {
            registration.update().then(() => {
              console.log('Фоновая проверка обновлений выполнена');
            });
          }, 60 * 60 * 1000);
          
        } catch (error) {
          console.error('Ошибка регистрации Service Worker: ', error);
        }
      });
    }
    
    // Обработка сообщений от Service Worker
    navigator.serviceWorker.addEventListener('message', event => {
      switch (event.data.type) {
        case 'RELOAD_REQUIRED':
          console.log('Требуется перезагрузка для применения обновления');
          if (confirm('Доступно обновление приложения. Перезагрузить сейчас?')) {
            window.location.reload();
          }
          break;
          
        case 'VERSION_MISMATCH':
          console.log(`Версия SW (${event.data.swVersion}) не совпадает с приложением (${APP_VERSION})`);
          navigator.serviceWorker.getRegistration().then(reg => {
            reg?.update();
          });
          break;
          
        case 'SW_LOG':
          console.log('[SW]', event.data.message);
          break;
      }
    });
  </script>
</body>
</html>
