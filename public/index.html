<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AI Помощник</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    :root {
      --primary: #ffffff;
      --primary-dark: #1a1a1a;
      --accent: #4263eb;
      --danger: #ff6b6b;
      --success: #40c057;
      --warning: #ffd43b;
      --background: #0a0a0a;
      --surface: #121212;
      --card-bg: #1e1e1e;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --text-tertiary: #8a8a8a;
      --border: #2a2a2a;
      --shadow: rgba(0, 0, 0, 0.4);
    }
    
    [data-theme="light"] {
      --primary: #000000;
      --primary-dark: #f0f0f0;
      --background: #f5f5f5;
      --surface: #ffffff;
      --card-bg: #ffffff;
      --text-primary: #121212;
      --text-secondary: #5a5a5a;
      --text-tertiary: #8a8a8a;
      --border: #e0e0e0;
      --shadow: rgba(0, 0, 0, 0.08);
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      height: 100vh;
      background: var(--background);
      padding: 0;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: var(--text-primary);
      transition: background 0.3s ease;
    }
    
    .status-bar {
      height: 44px;
      padding: 0 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 17px;
      font-weight: 600;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    
    .time {
      font-weight: 600;
    }
    
    .theme-toggle {
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 24px;
      cursor: pointer;
      padding: 5px;
    }
    
    .app-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 24px;
      max-width: 500px;
      margin: 0 auto;
      flex-grow: 1;
      align-content: flex-start;
    }
    
    .app-icon {
      width: 100%;
      aspect-ratio: 1/1;
      background: var(--card-bg);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 6px 16px var(--shadow);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
      user-select: none;
      border: 1px solid var(--border);
    }
    
    .app-icon:active {
      transform: scale(0.95);
    }
    
    .app-icon:hover {
      box-shadow: 0 8px 24px var(--shadow);
    }
    
    .app-icon i {
      font-size: 36px;
      margin-bottom: 12px;
      color: var(--accent);
    }
    
    .app-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      text-align: center;
      max-width: 80%;
    }
    
    .app-description {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 6px;
      padding: 0 10px;
      text-align: center;
    }
    
    .control-panel {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 20px;
      margin-top: auto;
      box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.1);
      border-top: 1px solid var(--border);
    }
    
    .control-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      gap: 10px;
    }
    
    .control-button {
      flex: 1;
      background: var(--card-bg);
      border-radius: 14px;
      padding: 15px 10px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    
    .control-button:active {
      transform: scale(0.95);
    }
    
    .control-button i {
      font-size: 24px;
      display: block;
      margin-bottom: 8px;
      color: var(--accent);
    }
    
    .status-indicator {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-secondary);
    }
    
    .status-indicator.online {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }
    
    .status-indicator.offline {
      background: var(--danger);
      box-shadow: 0 0 8px var(--danger);
    }
    
    .status-indicator.recent {
      background: var(--warning);
      box-shadow: 0 0 8px var(--warning);
    }
    
    .control-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }
    
    .version-info {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      color: var(--text-tertiary);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .version-text {
      margin-bottom: 8px;
    }
    
    .update-button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .update-button:active {
      transform: scale(0.95);
    }
    
    .update-indicator {
      display: none;
      position: fixed;
      top: 60px;
      right: 16px;
      background: var(--success);
      color: white;
      border-radius: 20px;
      padding: 5px 15px;
      font-size: 12px;
      z-index: 100;
      animation: pulse 2s infinite;
    }
    
    .home-indicator {
      width: 140px;
      height: 5px;
      background: var(--text-primary);
      border-radius: 3px;
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0.3;
    }
    
    .app-icon::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .app-icon:hover::after {
      opacity: 1;
    }
    
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    
    .connection-info {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-bg);
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 10;
      border: 1px solid var(--border);
      box-shadow: 0 4px 12px var(--shadow);
      display: none;
    }
  </style>
</head>
<body>
  <div class="status-bar">
    <div class="time" id="current-time">9:41</div>
    <div>
      <button class="theme-toggle" id="theme-toggle">🌓</button>
    </div>
  </div>
  
  <div class="update-indicator" id="update-indicator">Доступно обновление!</div>
  
  <div class="app-grid">
    <div class="app-icon" id="chat-app">
      <i>💬</i>
      <div class="app-name">AI Чат</div>
      <div class="app-description">Общение с ИИ-помощником</div>
    </div>
    
    <div class="app-icon" id="calendar-app">
      <i>📅</i>
      <div class="app-name">Календарь</div>
      <div class="app-description">Управление событиями</div>
    </div>
  </div>
  
  <div class="control-panel">
    <div class="control-row">
      <div class="control-button" id="refresh-button">
        <i>🔄</i>
        <div class="control-label">Обновить</div>
      </div>
      
      <div class="control-button" id="update-button">
        <i>🔄</i>
        <div class="control-label">Проверить обновления</div>
        <div class="status-indicator" id="update-status"></div>
      </div>
      
      <div class="control-button" id="connection-button">
        <i>📶</i>
        <div class="control-label">Соединение</div>
        <div class="status-indicator" id="connection-status"></div>
      </div>
    </div>
  </div>
  
  <div class="version-info">
    <div class="version-text" id="version-display">Версия 2.6</div>
    <div class="connection-info" id="connection-info">Последний обмен: только что</div>
  </div>
  
  <div class="home-indicator"></div>

<script>
    // Конфигурация приложения
    const APP_VERSION = "2.6";
    let newVersionAvailable = false;
    let lastConnectionTime = null;
    let connectionTimer = null;
    
    // Инициализация приложения
    function initApp() {
      // Установка темы из localStorage
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      
      // Обновляем время
      updateTime();
      setInterval(updateTime, 60000);
      
      // Инициализация статуса соединения
      initConnectionStatus();
      
      // Назначаем обработчики
      document.getElementById('chat-app').addEventListener('click', () => {
        window.location.href = 'chat.html';
      });
      
      document.getElementById('calendar-app').addEventListener('click', () => {
        localStorage.setItem('calendar_command', 'true');
        window.location.href = 'chat.html';
      });
      
      document.getElementById('refresh-button').addEventListener('click', () => {
        window.location.reload();
      });
      
      document.getElementById('update-button').addEventListener('click', checkForUpdates);
      document.getElementById('connection-button').addEventListener('click', showConnectionInfo);
      
      document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
      
      // Показываем версию
      document.getElementById('version-display').textContent = `Версия ${APP_VERSION}`;
      
      // Проверка обновлений при запуске
      setTimeout(checkForUpdates, 2000);
      
      // Инициируем тестовый запрос для проверки соединения
      testConnection();
    }
    
    // Инициализация статуса соединения
    function initConnectionStatus() {
      // Загружаем последнее время соединения из localStorage
      const savedTime = localStorage.getItem('last_connection');
      lastConnectionTime = savedTime ? new Date(savedTime) : new Date();
      
      // Обновляем индикатор
      updateConnectionIndicator();
      
      // Запускаем периодическую проверку
      setInterval(updateConnectionIndicator, 60000);
    }
    
    // Обновление индикатора соединения
    function updateConnectionIndicator() {
      const now = new Date();
      const diff = Math.floor((now - lastConnectionTime) / 1000); // разница в секундах
      const statusIndicator = document.getElementById('connection-status');
      
      // Определяем статус
      if (diff < 60) { // менее 1 минуты
        statusIndicator.className = 'status-indicator online';
      } else if (diff < 300) { // 1-5 минут
        statusIndicator.className = 'status-indicator recent';
      } else { // более 5 минут
        statusIndicator.className = 'status-indicator offline';
      }
    }
    
    // Показ информации о соединении
    function showConnectionInfo() {
      const infoElement = document.getElementById('connection-info');
      const now = new Date();
      const diff = Math.floor((now - lastConnectionTime) / 1000); // разница в секундах
      
      let timeText;
      if (diff < 60) {
        timeText = 'только что';
      } else if (diff < 3600) {
        const minutes = Math.floor(diff / 60);
        timeText = `${minutes} мин назад`;
      } else {
        const hours = Math.floor(diff / 3600);
        timeText = `${hours} ч назад`;
      }
      
      infoElement.textContent = `Последний обмен: ${timeText}`;
      infoElement.style.display = 'block';
      
      // Автоматическое скрытие через 3 секунды
      clearTimeout(connectionTimer);
      connectionTimer = setTimeout(() => {
        infoElement.style.display = 'none';
      }, 3000);
    }
    
    // Тестовый запрос для проверки соединения
    function testConnection() {
      fetch('/?connection_test=1', { cache: 'no-store' })
        .then(() => {
          updateConnectionTime();
        })
        .catch(() => {
          // В случае ошибки все равно обновляем время попытки
          updateConnectionTime();
        });
    }
    
    // Обновление времени последнего соединения
    function updateConnectionTime() {
      lastConnectionTime = new Date();
      localStorage.setItem('last_connection', lastConnectionTime.toISOString());
      updateConnectionIndicator();
    }
    
    // Функция проверки обновлений
    async function checkForUpdates() {
      const updateIndicator = document.getElementById('update-indicator');
      const statusIndicator = document.getElementById('update-status');
      
      // Показываем статус проверки
      statusIndicator.className = 'status-indicator recent';
      
      try {
        const response = await fetch(`/api/check-update?v=${APP_VERSION}`);
        if (!response.ok) throw new Error('Ошибка сети');
        
        const data = await response.json();
        
        if (data.update_available) {
          newVersionAvailable = true;
          updateIndicator.style.display = 'block';
          updateIndicator.textContent = `Доступна версия ${data.current_version}`;
          updateIndicator.style.background = 'var(--success)';
          
          // Обновляем статус
          statusIndicator.className = 'status-indicator online';
          
          // Показываем список изменений
          alert(`Доступно обновление! (v${data.current_version})\n\nИзменения:\n• ${data.changelog.join('\n• ')}`);
        } else {
          alert('У вас установлена последняя версия приложения');
          statusIndicator.className = 'status-indicator online';
        }
        
        // Обновляем время соединения
        updateConnectionTime();
      } catch (error) {
        console.error('Ошибка проверки обновлений:', error);
        alert('Не удалось проверить обновления. Пожалуйста, проверьте подключение к интернету.');
        statusIndicator.className = 'status-indicator offline';
        
        // Показываем информацию о соединении
        showConnectionInfo();
      }
    }
    
    // Обновляем время в статус-баре
    function updateTime() {
      const now = new Date();
      const hours = now.getHours().toString().padStart(2, '0');
      const minutes = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('current-time').textContent = `${hours}:${minutes}`;
    }
    
    // Переключение темы
    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    }
    
    // Запуск приложения после загрузки
    window.addEventListener('DOMContentLoaded', initApp);
  </script>
  
  <!-- Скрипт для работы с Service Worker -->
  <script>
    // Регистрация Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const registration = await navigator.serviceWorker.register('/sw.js');
          
          console.log('ServiceWorker зарегистрирован с областью видимости: ', registration.scope);
          
          // Принудительное обновление при изменении версии
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('Новая версия обнаружена! Принудительное обновление...');
                newWorker.postMessage({type: 'SKIP_WAITING'});
              }
            });
          });
          
          // Проверка версии при загрузке
          navigator.serviceWorker.controller?.postMessage({
            type: 'CHECK_VERSION',
            version: APP_VERSION
          });
          
          // Периодическая проверка обновлений (каждый час)
          setInterval(() => {
            registration.update().then(() => {
              console.log('Фоновая проверка обновлений выполнена');
              updateConnectionTime(); // Обновляем время соединения
            });
          }, 60 * 60 * 1000);
          
        } catch (error) {
          console.error('Ошибка регистрации Service Worker: ', error);
        }
      });
    }
    
    // Обработка сообщений от Service Worker
    navigator.serviceWorker.addEventListener('message', event => {
      switch (event.data.type) {
        case 'RELOAD_REQUIRED':
          console.log('Требуется перезагрузка для применения обновления');
          if (confirm('Доступно обновление приложения. Перезагрузить сейчас?')) {
            window.location.reload();
          }
          break;
          
        case 'VERSION_MISMATCH':
          console.log(`Версия SW (${event.data.swVersion}) не совпадает с приложением (${APP_VERSION})`);
          // Принудительно обновляем Service Worker
          navigator.serviceWorker.getRegistration().then(reg => {
            reg?.update().then(() => updateConnectionTime());
          });
          break;
          
        case 'SW_LOG':
          console.log('[SW]', event.data.message);
          break;
      }
    });
  </script>
</body>
</html>
