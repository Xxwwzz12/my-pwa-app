<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завершение регистрации</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; background: #4285f4; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Завершите регистрацию</h1>
    <form id="registration-form">
        <input type="hidden" id="google-id">
        
        <div class="form-group">
            <label for="first-name">Имя*</label>
            <input type="text" id="first-name" required>
        </div>
        
        <div class="form-group">
            <label for="last-name">Фамилия*</label>
            <input type="text" id="last-name" required>
        </div>
        
        <div class="form-group">
            <label for="gender">Пол*</label>
            <select id="gender" required>
                <option value="">Выберите</option>
                <option value="male">Мужской</option>
                <option value="female">Женский</option>
                <option value="other">Другой</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="age">Возраст*</label>
            <input type="number" id="age" min="1" max="120" required>
        </div>
        
        <div class="form-group">
            <label for="avatar">Аватар (URL)</label>
            <input type="url" id="avatar">
        </div>
        
        <div class="form-group">
            <label for="role">Роль в семье*</label>
            <select id="role" required>
                <option value="">Выберите роль</option>
                <option value="senior_parent">Старший родитель</option>
                <option value="parent">Родитель</option>
                <option value="child">Ребенок</option>
                <option value="relative">Родственник</option>
            </select>
        </div>
        
        <button type="submit">Завершить регистрацию</button>
    </form>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Получаем данные пользователя из сессии
            fetch('/api/user')
                .then(response => response.json())
                .then(user => {
                    document.getElementById('google-id').value = user.id;
                    document.getElementById('first-name').value = user.name.split(' ')[0] || '';
                    document.getElementById('last-name').value = user.name.split(' ')[1] || '';
                });
                
            // Обработка отправки формы
            document.getElementById('registration-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const userData = {
                    googleId: document.getElementById('google-id').value,
                    firstName: document.getElementById('first-name').value,
                    lastName: document.getElementById('last-name').value,
                    gender: document.getElementById('gender').value,
                    age: document.getElementById('age').value,
                    avatar: document.getElementById('avatar').value || null,
                    role: document.getElementById('role').value
                };
                
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                if (response.ok) {
                    window.location.href = '/family.html';
                } else {
                    alert('Ошибка регистрации');
                }
            });
        });
    </script>
</body>
</html>
